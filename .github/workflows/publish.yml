name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Verify bundle exists
        run: |
          test -f packages/cli/bin/cuekit.js || (echo "Bundle not found" && exit 1)
          test -f packages/cli/README.md || (echo "README not found" && exit 1)
          echo "Bundle and README verified"

      - name: Publish to npm
        run: |
          cd packages/cli
          npm publish --provenance --access public
