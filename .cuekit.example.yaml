# Copy this file to .cuekit.yaml and adjust for your project.
# Project-local config should be reviewed before committing. This example uses safe prompt permissions.

project:
  # Optional stable human id. cuekit still combines this with the config root
  # to derive an opaque project_uid, so copied repos do not collide.
  id: cuekit
  name: Cuekit

# cuekit defaults to tmux. Uncomment to opt into zellij for task panes.
# `strict: true` makes missing/broken zellij a hard failure instead of
# warning and falling back to tmux.
# multiplexer:
#   backend: zellij
#   strict: false

tui:
  # project = default: use .cuekit.yaml project identity, including legacy
  # sessions whose project_root matches this config root.
  # path = ignore project identity and scope to the current path/Git root.
  scope: project

submit:
  # Optional defaults for submit_task. Explicit request fields always win.
  # If role is set, the selected Agent Profile can still provide agent/model.
  role: worker
  agent: claude-code
  model: sonnet
  # Runtime submit calls can pass timeout_ms: null to opt out for one long-running task.
  timeout_ms: 1800000
  priority: normal

teams:
  roles:
    # Default Agent Profile role per team position.
    coordinator: planner
    worker: worker
    reviewer: reviewer
  wait:
    # Defaults for wait_team unless request fields override them.
    timeout_ms: 300000
    poll_interval_ms: 2000
  # Planned/inactive until cuekit has a delete_team operation.
  cleanup: keep-team

strategies:
  docs-polish:
    description: "Small README/docs improvements"
    intent: "Make minimal docs-only changes and verify meaning is preserved."
    recommended_team:
      coordinator:
        position: coordinator
        role: planner
        agent: pi
      worker:
        position: worker
        role: worker
        agent: pi
      reviewer:
        position: reviewer
        role: reviewer
        agent: claude-code
        model: sonnet
    guardrails:
      - "Keep changes docs-only."
      - "Do not commit/push/PR unless explicitly requested."
    success_criteria:
      - "Diff is limited to README/docs."
      - "Meaning is preserved."
    checks:
      - "git diff --check"
      - "bun run check"
    autonomy:
      allow_additional_workers: true
      require_reviewer: true

adapters:
  claude-code:
    # prompt keeps generated/example config safe. Use bypass only for trusted
    # repositories when you explicitly want adapter permission bypass defaults.
    # Config-derived role/agent defaults still force safe adapter options unless
    # a caller explicitly supplies adapter_options.
    permissions: prompt
  opencode:
    permissions: prompt
  gemini:
    # gemini always passes --skip-trust at the adapter layer (the trusted-folder
    # gate is not auto-skipped in non-TTY mode), so this `permissions` toggle
    # only controls whether `-y` (yolo) is added.
    permissions: prompt

# Lifecycle hooks — fire-and-forget shell commands on task/team events.
# Each event accepts a single definition or an array (run in parallel).
# Commands receive metadata via environment variables:
#   CUEKIT_EVENT, CUEKIT_TASK_ID, CUEKIT_STATUS, CUEKIT_AGENT_KIND,
#   CUEKIT_AGENT_MODEL, CUEKIT_OBJECTIVE, CUEKIT_TEAM_ID, CUEKIT_POSITION,
#   CUEKIT_STRATEGY, CUEKIT_SESSION_ID, CUEKIT_DURATION_MS
# Hooks run asynchronously and never block the main workflow.
#
# macOS Notification Center example:
# hooks:
#   on_task_start:
#     command: "osascript -e 'display notification \"Started: $CUEKIT_OBJECTIVE\" with title \"cuekit\"'"
#     timeout: 10
#   on_task_complete:
#     command: "osascript -e 'display notification \"Done: $CUEKIT_OBJECTIVE\" with title \"cuekit\"'"
#     timeout: 10
#   on_task_fail:
#     command: "osascript -e 'display notification \"Failed: $CUEKIT_OBJECTIVE\" with title \"cuekit\"'"
#     timeout: 10
#   on_task_cancel:
#     command: "osascript -e 'display notification \"Cancelled: $CUEKIT_OBJECTIVE\" with title \"cuekit\"'"
#     timeout: 10
#   on_task_timeout:
#     command: "osascript -e 'display notification \"Timed out: $CUEKIT_OBJECTIVE\" with title \"cuekit\"'"
#     timeout: 10
#   on_task_block:
#     command: "osascript -e 'display notification \"Blocked: $CUEKIT_OBJECTIVE\" with title \"cuekit\"'"
#     timeout: 10
#   on_team_start:
#     command: "osascript -e 'display notification \"Team started: $CUEKIT_TEAM_ID\" with title \"cuekit\"'"
#     timeout: 10
#   on_team_complete:
#     command: "osascript -e 'display notification \"Team done: $CUEKIT_TEAM_ID\" with title \"cuekit\"'"
#     timeout: 10
#
# Multiple hooks per event (run in parallel):
# hooks:
#   on_task_complete:
#     - command: "osascript -e 'display notification \"Done\" with title \"cuekit\"'"
#       timeout: 10
#     - command: "echo '$CUEKIT_TASK_ID completed' >> ~/cuekit.log"
#       timeout: 5
#
# Slack webhook example:
# hooks:
#   on_task_complete:
#     command: 'curl -s -X POST -H "Content-Type: application/json" -d "{\"text\":\"Task $CUEKIT_TASK_ID completed\"}" https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
#     timeout: 10

# Per-task adapter_options can opt into non-interactive batch mode:
#   {"mode":"batch"}
# Batch mode remains attachable for output/transcript inspection, but is not steerable.
